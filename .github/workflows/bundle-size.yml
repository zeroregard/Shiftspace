name: 📦 Bundle Size

on:
  workflow_dispatch: # disabled — uncomment pull_request to re-enable

concurrency:
  group: bundle-size-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bundle-size:
    name: Bundle Size
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build PR branch
        run: bun run build

      - name: Measure PR sizes
        run: bun run scripts/bundle-sizes.ts --json > /tmp/pr-sizes.json

      # Save the bundle-sizes script before switching branches,
      # since the base branch may not have it yet.
      - name: Save measurement script
        run: cp scripts/bundle-sizes.ts /tmp/bundle-sizes.ts

      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          clean: false

      - name: Install base dependencies
        run: bun install --frozen-lockfile

      - name: Build base branch
        run: bun run build

      - name: Measure base sizes
        run: bun run /tmp/bundle-sizes.ts --json > /tmp/base-sizes.json

      - name: Checkout PR again (for comparison script)
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Generate comparison comment
        run: bun run scripts/bundle-sizes.ts --compare /tmp/base-sizes.json /tmp/pr-sizes.json > /tmp/comment.md

      - name: Post or update PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: /tmp/comment.md
