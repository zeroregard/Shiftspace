name: E2E Tests

on:
  pull_request:
  push:
    branches: [main, master]

concurrency:
  group: e2e-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: 🎭 E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bun run --filter @shiftspace/preview exec playwright install chromium --with-deps

      - name: Check for existing screenshot baselines
        id: baselines
        run: |
          if find apps/preview/e2e/__screenshots__ -name '*.png' 2>/dev/null | grep -q .; then
            echo "exist=true" >> "$GITHUB_OUTPUT"
          else
            echo "exist=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run E2E tests
        if: steps.baselines.outputs.exist == 'true'
        run: bun run --filter @shiftspace/preview test:e2e

      - name: Generate initial screenshot baselines
        if: steps.baselines.outputs.exist == 'false'
        run: |
          echo "No screenshot baselines found — generating initial baselines."
          echo "Run the 'Update Screenshots' workflow to commit them, then re-run this check."
          bun run --filter @shiftspace/preview test:e2e:update

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/preview/playwright-report/
          retention-days: 7
