name: 🎭 E2E Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Fetch base branch for affected detection
        run: git fetch origin ${{ github.event.pull_request.base.ref }}:refs/remotes/origin/${{ github.event.pull_request.base.ref }} || true

      - name: Determine affected e2e specs
        id: affected
        run: |
          # Maps package directories to e2e specs (mirrors nx.json named inputs).
          # renderer-core / renderer-grove / renderer-inspection are simple package checks.
          CHANGED=$(git diff --name-only "origin/${{ github.event.pull_request.base.ref }}"...HEAD)

          has_changes() { echo "$CHANGED" | grep -qE "$1"; }

          # --- package-level groups ---
          E2E_SHARED=false
          has_changes '^apps/preview/(playwright\.config\.ts|index\.html|vite\.config\.ts|src/(App\.tsx|main\.tsx|styles\.css))' && E2E_SHARED=true
          has_changes '^tsconfig\.base\.json' && E2E_SHARED=true

          CORE=false
          has_changes '^packages/(renderer-core|renderer|ui)/src/' && CORE=true

          GROVE=false
          has_changes '^packages/renderer-grove/src/' && GROVE=true

          INSPECTION=false
          has_changes '^packages/renderer-inspection/src/' && INSPECTION=true

          # --- map to spec files ---
          SPECS=""
          add_spec() { SPECS="${SPECS} e2e/$1.spec.ts"; }

          # controls: core + grove + preview controls/mock
          if has_changes '^apps/preview/e2e/controls\.spec\.ts' \
             || has_changes '^apps/preview/src/(controls|mock)/|^apps/preview/src/useSimulationHandlers\.ts' \
             || $E2E_SHARED || $CORE || $GROVE; then
            add_spec controls
          fi

          # diagnostics: core + inspection + preview mock/mockData
          if has_changes '^apps/preview/e2e/diagnostics\.spec\.ts' \
             || has_changes '^apps/preview/src/(mockData\.ts|mock/)' \
             || $E2E_SHARED || $CORE || $INSPECTION; then
            add_spec diagnostics
          fi

          # graph: core + grove + inspection + all preview src
          if has_changes '^apps/preview/e2e/graph\.spec\.ts' \
             || has_changes '^apps/preview/src/' \
             || $E2E_SHARED || $CORE || $GROVE || $INSPECTION; then
            add_spec graph
          fi

          # inspector-file-categories: core + inspection + preview mock/mockData
          if has_changes '^apps/preview/e2e/inspector-file-categories\.spec\.ts' \
             || has_changes '^apps/preview/src/(mockData\.ts|mock/)' \
             || $E2E_SHARED || $CORE || $INSPECTION; then
            add_spec inspector-file-categories
          fi

          # hover-tooltips: core + inspection + preview mock/mockData
          if has_changes '^apps/preview/e2e/hover-tooltips\.spec\.ts' \
             || has_changes '^apps/preview/src/(mockData\.ts|mock/)' \
             || $E2E_SHARED || $CORE || $INSPECTION; then
            add_spec hover-tooltips
          fi

          # search-filter: core + inspection + preview mock
          if has_changes '^apps/preview/e2e/search-filter\.spec\.ts' \
             || has_changes '^apps/preview/src/mock/' \
             || $E2E_SHARED || $CORE || $INSPECTION; then
            add_spec search-filter
          fi

          # sidebar: core + grove + preview SidebarPage/mock
          if has_changes '^apps/preview/e2e/sidebar\.spec\.ts' \
             || has_changes '^apps/preview/src/(SidebarPage\.tsx|mock/)' \
             || $E2E_SHARED || $CORE || $GROVE; then
            add_spec sidebar
          fi

          # Deduplicate
          SPECS=$(echo "$SPECS" | tr ' ' '\n' | sort -u | tr '\n' ' ' | xargs)

          if [ -n "$SPECS" ]; then
            echo "run_e2e=true" >> $GITHUB_OUTPUT
            echo "specs=${SPECS}" >> $GITHUB_OUTPUT
            echo "Affected specs: ${SPECS}"
          else
            echo "run_e2e=false" >> $GITHUB_OUTPUT
            echo "specs=" >> $GITHUB_OUTPUT
            echo "No e2e specs affected"
          fi

      - name: Restore Playwright browsers cache
        if: steps.affected.outputs.run_e2e == 'true'
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('apps/preview/package.json') }}

      - name: Install Playwright system deps
        if: steps.affected.outputs.run_e2e == 'true' && steps.playwright-cache.outputs.cache-hit != 'true'
        run: bun run --filter @shiftspace/preview playwright:install-deps

      - name: Install Playwright browsers
        if: steps.affected.outputs.run_e2e == 'true' && steps.playwright-cache.outputs.cache-hit != 'true'
        run: bun run --filter @shiftspace/preview playwright:install

      - name: Check for e2e tests
        id: check-tests
        if: steps.affected.outputs.run_e2e == 'true'
        run: |
          if find apps/preview/e2e -name '*.spec.ts' 2>/dev/null | grep -q .; then
            echo "exist=true" >> "$GITHUB_OUTPUT"
          else
            echo "exist=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Record baseline and head SHAs
        id: baseline
        run: |
          # Use the merge-base with the PR target so that NEW screenshots
          # added in the PR show up as "Added" in the comparison comment.
          BASE_SHA=$(git merge-base HEAD origin/${{ github.event.pull_request.base.ref }})
          echo "Base SHA: ${BASE_SHA}"
          echo "Head SHA: $(git rev-parse HEAD)"
          echo "sha=${BASE_SHA}" >> $GITHUB_OUTPUT
          echo "head_sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Run Playwright with --update-snapshots
        id: playwright
        if: steps.check-tests.outputs.exist == 'true'
        continue-on-error: true
        run: |
          set -o pipefail
          echo "=== Screenshot baselines before test run ==="
          find apps/preview/e2e/__screenshots__ -name '*.png' 2>/dev/null | sort || echo "<none>"
          echo "Running specs: ${{ steps.affected.outputs.specs }}"
          cd apps/preview
          npx playwright test ${{ steps.affected.outputs.specs }} --update-snapshots 2>&1 | tee /tmp/playwright-output.txt
          echo "=== Screenshot baselines after test run ==="
          find e2e/__screenshots__ -name '*.png' 2>/dev/null | sort || echo "<none>"

      - name: Detect screenshot changes
        id: detect
        if: steps.check-tests.outputs.exist == 'true'
        run: |
          echo "=== git status of screenshots ==="
          git status -- 'apps/preview/e2e/__screenshots__/'

          # Staged changes
          MODIFIED=$(git diff --name-only -- 'apps/preview/e2e/__screenshots__/**/*.png' 'apps/preview/e2e/__screenshots__/**/*.jpg' 2>/dev/null || true)
          echo "Modified tracked files: ${MODIFIED:-<none>}"

          # Untracked new files
          NEW=$(git ls-files --others --exclude-standard -- 'apps/preview/e2e/__screenshots__/**/*.png' 'apps/preview/e2e/__screenshots__/**/*.jpg' 2>/dev/null || true)
          echo "New untracked files: ${NEW:-<none>}"

          if [ -n "$MODIFIED" ] || [ -n "$NEW" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate diff images
        if: steps.check-tests.outputs.exist == 'true' && steps.detect.outputs.has_changes == 'true'
        run: |
          SCREENSHOTS_DIR="apps/preview/e2e/__screenshots__"
          DIFFS_DIR="${SCREENSHOTS_DIR}/__diffs__"
          rm -rf "$DIFFS_DIR"
          mkdir -p "$DIFFS_DIR"

          # Only generate diffs for modified files (not new/deleted)
          MODIFIED=$(git diff --name-only -- "${SCREENSHOTS_DIR}/**/*.png" 2>/dev/null || true)
          if [ -z "$MODIFIED" ]; then
            echo "No modified screenshots to diff."
            exit 0
          fi

          while IFS= read -r file; do
            [ -z "$file" ] && continue
            NAME=$(basename "$file" .png)
            SPEC_DIR=$(basename "$(dirname "$file")")
            DIFF_OUT="${DIFFS_DIR}/${SPEC_DIR}--${NAME}.png"

            # Extract old version from git
            git show "HEAD:${file}" > /tmp/old_screenshot.png 2>/dev/null || continue

            # Generate diff: faded original with red highlights on changed pixels
            compare -metric AE -fuzz 2% \
              /tmp/old_screenshot.png "$file" \
              -highlight-color '#FF000080' -lowlight-color 'none' \
              -compose src "$DIFF_OUT" 2>/dev/null || true

            if [ -f "$DIFF_OUT" ]; then
              echo "Generated diff: $DIFF_OUT"
            fi
          done <<< "$MODIFIED"

          # Count generated diffs
          DIFF_COUNT=$(find "$DIFFS_DIR" -name '*.png' 2>/dev/null | wc -l | tr -d ' ')
          echo "Generated ${DIFF_COUNT} diff image(s)"

      - name: Commit updated screenshots
        id: commit
        if: steps.check-tests.outputs.exist == 'true' && steps.detect.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 'apps/preview/e2e/__screenshots__/'
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No screenshot changes to commit."
          else
            git commit -m "chore: update e2e snapshots [skip ci]"
            git push -u origin ${{ github.head_ref }}
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "new_sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          fi

      - name: Upload Playwright report
        if: always() && steps.playwright.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/preview/playwright-report/
          retention-days: 7

      - name: Build PR comment
        id: build-comment
        if: always()
        env:
          REPO: ${{ github.repository }}
          OLD_SHA: ${{ steps.baseline.outputs.sha }}
          NEW_SHA: ${{ steps.commit.outputs.new_sha || steps.baseline.outputs.head_sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          PLAYWRIGHT_OUTCOME: ${{ steps.playwright.outcome || 'skipped' }}
        run: |
          SCREENSHOTS_DIR="apps/preview/e2e/__screenshots__"

          # Fallback: compute SHAs if not available from earlier steps
          if [ -z "$OLD_SHA" ]; then
            OLD_SHA=$(git merge-base HEAD origin/${{ github.event.pull_request.base.ref }} 2>/dev/null || echo "")
          fi
          if [ -z "$NEW_SHA" ]; then
            NEW_SHA=$(git rev-parse HEAD)
          fi

          echo "Comparing OLD_SHA=${OLD_SHA} → NEW_SHA=${NEW_SHA}"

          # Collect changed/added/deleted screenshots vs base branch
          CHANGED_FILES=$(git diff --name-status "${OLD_SHA}" "${NEW_SHA}" -- "${SCREENSHOTS_DIR}/" 2>/dev/null || true)
          echo "Changed files: ${CHANGED_FILES:-<none>}"

          CHANGED_LIST=""
          NEW_LIST=""
          DELETED_LIST=""
          UNCHANGED_LIST=""

          DIFFS_DIR="${SCREENSHOTS_DIR}/__diffs__"

          # Process changed files
          while IFS=$'\t' read -r status file; do
            [ -z "$file" ] && continue
            NAME=$(basename "$file" .png)
            SPEC_DIR=$(basename "$(dirname "$file")")
            case "$status" in
              M)
                BEFORE_URL="https://raw.githubusercontent.com/${REPO}/${OLD_SHA}/${file}"
                AFTER_URL="https://raw.githubusercontent.com/${REPO}/${NEW_SHA}/${file}"
                DIFF_FILE="${DIFFS_DIR}/${SPEC_DIR}--${NAME}.png"
                DIFF_URL="https://raw.githubusercontent.com/${REPO}/${NEW_SHA}/${DIFF_FILE}"
                CHANGED_LIST="${CHANGED_LIST}
          <details>
          <summary>🔄 ${NAME}.png</summary>

          | Before | After | Diff |
          |--------|-------|------|
          | ![before](${BEFORE_URL}) | ![after](${AFTER_URL}) | ![diff](${DIFF_URL}) |

          </details>
          "
                ;;
              A)
                AFTER_URL="https://raw.githubusercontent.com/${REPO}/${NEW_SHA}/${file}"
                NEW_LIST="${NEW_LIST}
          <details>
          <summary>🆕 ${NAME}</summary>

          ![new](${AFTER_URL})

          </details>
          "
                ;;
              D)
                BEFORE_URL="https://raw.githubusercontent.com/${REPO}/${OLD_SHA}/${file}"
                DELETED_LIST="${DELETED_LIST}
          <details>
          <summary>🗑️ ${NAME}</summary>

          ![removed](${BEFORE_URL})

          </details>
          "
                ;;
            esac
          done <<< "$CHANGED_FILES"

          # Collect unchanged screenshots (all tracked pngs not in the above lists)
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            NAME=$(basename "$file")
            # Skip if already listed as changed/added/deleted
            if echo "$CHANGED_FILES" | grep -q "$file"; then
              continue
            fi
            UNCHANGED_LIST="${UNCHANGED_LIST}${NAME}, "
          done < <(git ls-files -- "${SCREENSHOTS_DIR}/**/*.png" "${SCREENSHOTS_DIR}/**/*.jpg" 2>/dev/null || true)
          UNCHANGED_LIST="${UNCHANGED_LIST%, }"

          # Counts
          CHANGED_COUNT=$(echo "$CHANGED_FILES" | grep -c '^M' || true)
          NEW_COUNT=$(echo "$CHANGED_FILES" | grep -c '^A' || true)
          DELETED_COUNT=$(echo "$CHANGED_FILES" | grep -c '^D' || true)

          # Build comment
          {
            echo "<!-- e2e-screenshot-report -->"
            echo "## 📸 E2E Screenshot Report"
            echo ""

            if [ "$PLAYWRIGHT_OUTCOME" = "failure" ]; then
              echo "> **Tests failed.** Some tests hit timeouts or could not find expected elements. [View logs](${RUN_URL})."
              echo ""
            fi

            if [ "$CHANGED_COUNT" -eq 0 ] && [ "$NEW_COUNT" -eq 0 ] && [ "$DELETED_COUNT" -eq 0 ]; then
              echo "📸 All screenshots unchanged."
            else
              if [ "$CHANGED_COUNT" -gt 0 ]; then
                echo "### Changed (${CHANGED_COUNT})"
                echo ""
                echo "${CHANGED_LIST}"
              fi
              if [ "$NEW_COUNT" -gt 0 ]; then
                echo "### New (${NEW_COUNT})"
                echo ""
                echo "${NEW_LIST}"
              fi
              if [ "$DELETED_COUNT" -gt 0 ]; then
                echo "### Removed (${DELETED_COUNT})"
                echo ""
                echo "${DELETED_LIST}"
              fi
              if [ -n "$UNCHANGED_LIST" ]; then
                echo "### Unchanged"
                echo ""
                echo "${UNCHANGED_LIST}"
              fi
            fi

            echo ""
            echo "_[View workflow run](${RUN_URL})_"
          } > /tmp/pr-comment.md

          echo "comment_file=/tmp/pr-comment.md" >> "$GITHUB_OUTPUT"

      - name: Find existing PR comment
        id: find-comment
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMENT_ID=$(gh api \
            repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
            --jq '[.[] | select(.body | startswith("<!-- e2e-screenshot-report -->"))] | last | .id // empty')
          echo "comment_id=${COMMENT_ID:-}" >> "$GITHUB_OUTPUT"

      - name: Post or update PR comment
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMENT_ID="${{ steps.find-comment.outputs.comment_id }}"
          if [ -n "$COMMENT_ID" ]; then
            echo "Updating existing comment #${COMMENT_ID}."
            gh api \
              repos/${{ github.repository }}/issues/comments/${COMMENT_ID} \
              -X PATCH \
              -f body="$(cat /tmp/pr-comment.md)"
          else
            echo "Posting new comment."
            gh pr comment "${{ github.event.pull_request.number }}" \
              --repo "${{ github.repository }}" \
              --body-file /tmp/pr-comment.md
          fi

      - name: Post "no e2e tests" comment
        if: steps.affected.outputs.run_e2e == 'true' && steps.check-tests.outputs.exist == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body "<!-- e2e-screenshot-report -->
          ## 📸 E2E Screenshot Report

          No e2e tests found."

      - name: Fail if Playwright tests failed
        if: always() && steps.playwright.outcome == 'failure'
        run: |
          echo "::group::Playwright test output"
          cat /tmp/playwright-output.txt
          echo "::endgroup::"
          echo ""
          echo "❌ Playwright tests failed — see output above or download the playwright-report artifact for the full HTML report."
          exit 1
