name: 📦 Preview Build

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: preview-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  preview:
    name: Preview VSIX
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Restore Nx cache
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: nx-${{ runner.os }}-preview-${{ github.sha }}
          restore-keys: |
            nx-${{ runner.os }}-preview-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: npx nx run-many -t build

      - name: Set preview version
        id: version
        run: |
          cd apps/vscode-ext
          CURRENT=$(node -p "require('./package.json').version")
          SHORT_SHA="${GITHUB_SHA:0:7}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PREVIEW_VERSION="${CURRENT}-pr.${PR_NUMBER}.sha.${SHORT_SHA}"
          node -e "
            const p = require('./package.json');
            p.version = '${PREVIEW_VERSION}';
            require('fs').writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          "
          echo "version=${PREVIEW_VERSION}" >> $GITHUB_OUTPUT
          echo "vsix_name=shiftspace-${PREVIEW_VERSION}.vsix" >> $GITHUB_OUTPUT
          echo "::notice::Preview version: ${PREVIEW_VERSION}"

      - name: Package extension
        run: |
          cd apps/vscode-ext
          npx @vscode/vsce package --no-dependencies

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: shiftspace-preview-pr-${{ github.event.pull_request.number }}
          path: apps/vscode-ext/*.vsix
          retention-days: 7

      - name: Build PR comment
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          VSIX_NAME: ${{ steps.version.outputs.vsix_name }}
          PREVIEW_VERSION: ${{ steps.version.outputs.version }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          cat > /tmp/preview-comment.md <<EOF
          <!-- preview-build -->
          ## 📦 Preview Build

          | | |
          |---|---|
          | **Version** | \`${PREVIEW_VERSION}\` |
          | **VSIX** | \`${VSIX_NAME}\` |
          | **Commit** | \`${SHORT_SHA}\` |

          ### Install

          1. [**Download the artifact**](${RUN_URL}) (click *"shiftspace-preview-pr-${PR_NUMBER}"* in the Artifacts section)
          2. Install in VS Code:
             \`\`\`
             code --install-extension ${VSIX_NAME}
             \`\`\`

          _Built from ${SHORT_SHA} by [this workflow run](${RUN_URL})._
          EOF

      - name: Find existing PR comment
        id: find-comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMENT_ID=$(gh api \
            repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
            --jq '[.[] | select(.body | startswith("<!-- preview-build -->"))] | last | .id // empty')
          echo "comment_id=${COMMENT_ID:-}" >> "$GITHUB_OUTPUT"

      - name: Post or update PR comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMENT_ID="${{ steps.find-comment.outputs.comment_id }}"
          if [ -n "$COMMENT_ID" ]; then
            gh api \
              repos/${{ github.repository }}/issues/comments/${COMMENT_ID} \
              -X PATCH \
              -f body="$(cat /tmp/preview-comment.md)"
          else
            gh pr comment "${{ github.event.pull_request.number }}" \
              --repo "${{ github.repository }}" \
              --body-file /tmp/preview-comment.md
          fi
