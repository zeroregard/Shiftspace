name: 📦 Publish to VS Code Marketplace

on:
  # Auto-trigger after a successful Release workflow
  workflow_run:
    workflows: ['🚀 Release']
    types: [completed]

  # Manual trigger for on-demand publishing
  workflow_dispatch:
    inputs:
      version:
        description: 'Version bump type (ignored when auto-triggered by Release)'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
      dry-run:
        description: 'Dry run (package only, do not publish)'
        required: false
        type: boolean
        default: false

# Prevent concurrent publishes
concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    # Only run if: manual dispatch, OR the triggering Release workflow succeeded
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    permissions:
      contents: write # needed for pushing version bump + tags

    steps:
      - name: Determine trigger mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "auto=true" >> $GITHUB_OUTPUT
            echo "::notice::Auto-triggered by Release workflow (run #${{ github.event.workflow_run.run_number }})"
          else
            echo "auto=false" >> $GITHUB_OUTPUT
            echo "::notice::Manual dispatch (version=${{ inputs.version }}, dry-run=${{ inputs.dry-run }})"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Restore Nx cache
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: nx-${{ runner.os }}-publish-${{ github.sha }}
          restore-keys: |
            nx-${{ runner.os }}-publish-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # --- Auto-triggered: use the version Release already bumped ---
      - name: Read current version (auto)
        if: steps.mode.outputs.auto == 'true'
        id: read-version
        run: |
          VERSION=$(node -p "require('./apps/vscode-ext/package.json').version")
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "::notice::Using version from Release: v${VERSION}"

      # --- Manual dispatch: bump version ---
      - name: Bump version (manual)
        if: steps.mode.outputs.auto == 'false'
        id: bump
        run: |
          cd apps/vscode-ext
          CURRENT=$(node -p "require('./package.json').version")
          BUMP_TYPE="${{ inputs.version }}"
          NEW=$(node -e "
            const [ma, mi, pa] = '${CURRENT}'.split('.').map(Number);
            const v = {
              major: \`\${ma+1}.0.0\`,
              minor: \`\${ma}.\${mi+1}.0\`,
              patch: \`\${ma}.\${mi}.\${pa+1}\`
            }['${BUMP_TYPE}'];
            process.stdout.write(v);
          ")
          node -e "
            const p = require('./package.json');
            p.version = '${NEW}';
            require('fs').writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          "
          echo "version=${NEW}" >> $GITHUB_OUTPUT
          echo "::notice::Version bump: ${CURRENT} → ${NEW} (${BUMP_TYPE})"

      # --- Resolve final version from whichever step ran ---
      - name: Set version output
        id: version
        run: |
          VERSION="${{ steps.read-version.outputs.version || steps.bump.outputs.version }}"
          echo "value=${VERSION}" >> $GITHUB_OUTPUT

      - name: Build
        run: npx nx run-many -t build

      - name: Package extension
        run: |
          cd apps/vscode-ext
          npx @vscode/vsce package --no-dependencies
          VSIX=$(ls *.vsix)
          echo "vsix_file=${VSIX}" >> $GITHUB_ENV
          echo "::notice::Packaged ${VSIX}"

      - name: Publish to VS Code Marketplace
        if: ${{ inputs.dry-run != true }}
        run: |
          cd apps/vscode-ext
          npx @vscode/vsce publish -p ${{ secrets.VSCE_PAT }} --no-dependencies
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX Registry
        if: ${{ inputs.dry-run != true }}
        run: |
          cd apps/vscode-ext
          npx ovsx publish ${{ env.vsix_file }} -p ${{ secrets.OVSX_PAT }}
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        continue-on-error: true # Don't fail the whole workflow if Open VSX is down

      # --- Manual dispatch only: changelog + commit version bump + tag + GH release ---
      - name: Generate changelog (manual)
        if: steps.mode.outputs.auto == 'false' && inputs.dry-run != true
        id: changelog
        run: |
          PREV_BUMP=$(git log --oneline --format="%H %s" | grep -E "chore: (bump version|release)" | head -1 | cut -d' ' -f1)
          VERSION="${{ steps.version.outputs.value }}"

          node scripts/generate-changelog.mjs \
            --from "$PREV_BUMP" --to HEAD \
            --version "$VERSION" \
            --prepend apps/vscode-ext/CHANGELOG.md

          BODY=$(node scripts/generate-changelog.mjs \
            --from "$PREV_BUMP" --to HEAD \
            --format release-body)

          echo "body<<CHANGELOG_EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "CHANGELOG_EOF" >> $GITHUB_OUTPUT

      - name: Commit version bump
        if: steps.mode.outputs.auto == 'false' && inputs.dry-run != true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/vscode-ext/package.json apps/vscode-ext/CHANGELOG.md
          git commit -m "chore: release v${{ steps.version.outputs.value }}"
          git tag "v${{ steps.version.outputs.value }}"
          git push origin main --follow-tags

      - name: Create GitHub Release
        if: steps.mode.outputs.auto == 'false' && inputs.dry-run != true
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.value }}"
          name: "Shiftspace v${{ steps.version.outputs.value }}"
          body: |
            ## Shiftspace v${{ steps.version.outputs.value }}

            ${{ steps.changelog.outputs.body }}

            Published to the [VS Code Marketplace](https://marketplace.visualstudio.com/items?itemName=shiftspace.shiftspace).

            ### Manual install
            Download the `.vsix` file below and run:
            ```
            code --install-extension shiftspace-${{ steps.version.outputs.value }}.vsix
            ```
          files: apps/vscode-ext/${{ env.vsix_file }}

      - name: Upload .vsix artifact (dry run)
        if: ${{ inputs.dry-run == true }}
        uses: actions/upload-artifact@v4
        with:
          name: shiftspace-${{ steps.version.outputs.value }}.vsix
          path: apps/vscode-ext/${{ env.vsix_file }}

      - name: Summary
        run: |
          echo "## 🚀 Publish Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Version** | v${{ steps.version.outputs.value }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Trigger** | ${{ steps.mode.outputs.auto == 'true' && 'Auto (after Release)' || 'Manual dispatch' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Dry run** | ${{ inputs.dry-run || 'false' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Package** | ${{ env.vsix_file }} |" >> $GITHUB_STEP_SUMMARY
