# Release pipeline: builds on every push to main, then waits for manual approval
# before bumping the version, tagging, and creating a GitHub Release.
#
# How it works:
#   1. Push to main → "build" job runs automatically (validates build + packages .vsix)
#   2. Workflow pauses at the "release" job, waiting for approval in the GitHub UI
#   3. You approve → version bump, tag, GitHub Release, and the Publish workflow triggers
#   4. You don't approve, and a new push arrives → this run is cancelled, the new run
#      becomes the one waiting for approval (with all accumulated commits)
#
# Setup: create a "release" environment in GitHub repo settings with yourself as
# a required reviewer. (Settings → Environments → New → "release" → Required reviewers)

name: 🚀 Release

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - '.github/**'
      - 'apps/preview/e2e/**'
      - 'apps/preview/playwright.config.ts'
  workflow_dispatch:

# When a new push arrives, cancel any run still waiting for approval so only
# the latest commit set is pending. This is the key to "accumulating" commits.
concurrency:
  group: release
  cancel-in-progress: true

jobs:
  # ── Job 1: Build (automatic) ────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'chore: bump version')"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Restore Nx cache
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: nx-${{ runner.os }}-release-${{ github.sha }}
          restore-keys: |
            nx-${{ runner.os }}-release-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: npx nx run-many -t build

      - name: Package extension
        run: |
          cd apps/vscode-ext
          npx @vscode/vsce package --no-dependencies

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: apps/vscode-ext/*.vsix
          retention-days: 30

  # ── Job 2: Release (requires manual approval) ───────────────────────────
  release:
    needs: build
    runs-on: ubuntu-latest
    environment: release

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Bump patch version
        id: bump
        run: |
          cd apps/vscode-ext
          CURRENT=$(node -p "require('./package.json').version")
          NEW=$(node -p "const [ma,mi,pa] = '${CURRENT}'.split('.').map(Number); \`\${ma}.\${mi}.\${pa+1}\`")
          node -e "const p=require('./package.json'); p.version='${NEW}'; require('fs').writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n')"
          echo "version=${NEW}" >> $GITHUB_OUTPUT
          echo "Bumped ${CURRENT} → ${NEW}"

      - name: Generate changelog
        id: changelog
        run: |
          # Find the most recent version bump commit (before this run's changes)
          PREV_BUMP=$(git log --oneline --format="%H %s" | grep -E "chore: (bump version|release)" | head -1 | cut -d' ' -f1)
          VERSION="${{ steps.bump.outputs.version }}"

          # Generate and prepend to CHANGELOG.md
          node scripts/generate-changelog.mjs \
            --from "$PREV_BUMP" --to HEAD \
            --version "$VERSION" \
            --prepend apps/vscode-ext/CHANGELOG.md

          # Also generate release body for GitHub Release
          BODY=$(node scripts/generate-changelog.mjs \
            --from "$PREV_BUMP" --to HEAD \
            --format release-body)

          echo "body<<CHANGELOG_EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "CHANGELOG_EOF" >> $GITHUB_OUTPUT

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/vscode-ext/package.json apps/vscode-ext/CHANGELOG.md
          git commit -m "chore: bump version to v${{ steps.bump.outputs.version }}"

      - name: Tag and push
        run: |
          git tag "v${{ steps.bump.outputs.version }}"
          git push origin main --follow-tags

      - name: Download .vsix artifact
        uses: actions/download-artifact@v4
        with:
          name: vsix
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.bump.outputs.version }}"
          name: "v${{ steps.bump.outputs.version }}"
          body: |
            ## Shiftspace v${{ steps.bump.outputs.version }}

            ${{ steps.changelog.outputs.body }}

            ### Install
            Download the `.vsix` file below and install:
            ```
            code --install-extension shiftspace-${{ steps.bump.outputs.version }}.vsix
            ```
          files: artifacts/*.vsix
