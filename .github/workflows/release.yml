# Automated release: builds, packages .vsix, and creates a GitHub Release on push to main.
# For publishing to the VS Code Marketplace, use the manual "Publish" workflow instead.

name: 🚀 Release

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - '.github/**'
      - 'apps/preview/e2e/**'
      - 'apps/preview/playwright.config.ts'

# Prevent concurrent releases
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    # Skip if the commit was made by this workflow (version bump commit)
    if: "!contains(github.event.head_commit.message, 'chore: bump version')"

    permissions:
      contents: write # needed for pushing tags and creating releases

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Restore Nx cache
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: nx-${{ runner.os }}-release-${{ github.sha }}
          restore-keys: |
            nx-${{ runner.os }}-release-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Bump patch version
        id: bump
        run: |
          cd apps/vscode-ext
          # Read current version
          CURRENT=$(node -p "require('./package.json').version")
          # Bump patch
          NEW=$(node -p "const [ma,mi,pa] = '${CURRENT}'.split('.').map(Number); \`\${ma}.\${mi}.\${pa+1}\`")
          # Write new version
          node -e "const p=require('./package.json'); p.version='${NEW}'; require('fs').writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n')"
          echo "version=${NEW}" >> $GITHUB_OUTPUT
          echo "Bumped ${CURRENT} → ${NEW}"

      - name: Build
        run: npx nx run-many -t build

      - name: Package extension
        run: |
          cd apps/vscode-ext
          npx @vscode/vsce package --no-dependencies
          echo "vsix_file=$(ls *.vsix)" >> $GITHUB_ENV

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/vscode-ext/package.json
          git commit -m "chore: bump version to v${{ steps.bump.outputs.version }}"

      - name: Tag and push
        run: |
          git tag "v${{ steps.bump.outputs.version }}"
          git push origin main --follow-tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.bump.outputs.version }}"
          name: "v${{ steps.bump.outputs.version }}"
          body: |
            ## Shiftspace v${{ steps.bump.outputs.version }}

            ### Install
            Download the `.vsix` file below and install:
            ```
            code --install-extension shiftspace-${{ steps.bump.outputs.version }}.vsix
            ```
          files: apps/vscode-ext/${{ env.vsix_file }}
          generate_release_notes: true
