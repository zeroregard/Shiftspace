# Release pipeline: bump version, build, publish, and create a GitHub Release.
#
# How it works:
#   1. Trigger manually from the Actions tab (workflow_dispatch)
#   2. Pick the version bump type (patch / minor / major) and optional dry-run
#   3. The workflow bumps the version, generates a changelog entry, builds the
#      extension, publishes to VS Code Marketplace + Open VSX, commits the
#      version bump, tags, and creates a GitHub Release with the .vsix attached
#
# Secrets required:
#   - VSCE_PAT: Personal access token for the VS Code Marketplace
#   - OVSX_PAT: Personal access token for the Open VSX Registry

name: "\U0001F680 Release"

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
      dry-run:
        description: "Dry run (build + package only, skip publish and tagging)"
        required: false
        type: boolean
        default: false

# Prevent concurrent releases
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: write

    steps:
      # ── Setup ─────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Restore Nx cache
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: nx-${{ runner.os }}-release-${{ github.sha }}
          restore-keys: |
            nx-${{ runner.os }}-release-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # ── Version bump ──────────────────────────────────────────────────────
      - name: Bump version
        id: bump
        run: |
          cd apps/vscode-ext
          CURRENT=$(node -p "require('./package.json').version")
          BUMP_TYPE="${{ inputs.bump }}"
          NEW=$(node -e "
            const [ma, mi, pa] = '${CURRENT}'.split('.').map(Number);
            const v = {
              major: \`\${ma+1}.0.0\`,
              minor: \`\${ma}.\${mi+1}.0\`,
              patch: \`\${ma}.\${mi}.\${pa+1}\`
            }['${BUMP_TYPE}'];
            process.stdout.write(v);
          ")
          node -e "
            const p = require('./package.json');
            p.version = '${NEW}';
            require('fs').writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          "
          echo "version=${NEW}" >> $GITHUB_OUTPUT
          echo "previous=${CURRENT}" >> $GITHUB_OUTPUT
          echo "::notice::Version bump: ${CURRENT} → ${NEW} (${BUMP_TYPE})"

      # ── Changelog ─────────────────────────────────────────────────────────
      - name: Generate changelog
        id: changelog
        run: |
          # Find the most recent version bump commit
          PREV_BUMP=$(git log --oneline --format="%H %s" | grep -E "chore: (bump version|release)" | head -1 | cut -d' ' -f1)
          VERSION="${{ steps.bump.outputs.version }}"

          # Prepend versioned entry to CHANGELOG.md
          node scripts/generate-changelog.mjs \
            --from "$PREV_BUMP" --to HEAD \
            --version "$VERSION" \
            --prepend apps/vscode-ext/CHANGELOG.md

          # Generate release body for GitHub Release
          BODY=$(node scripts/generate-changelog.mjs \
            --from "$PREV_BUMP" --to HEAD \
            --format release-body)

          echo "body<<CHANGELOG_EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "CHANGELOG_EOF" >> $GITHUB_OUTPUT

      # ── Build + Package ───────────────────────────────────────────────────
      - name: Build
        run: npx nx run-many -t build

      - name: Package extension
        id: package
        run: |
          cd apps/vscode-ext
          npx @vscode/vsce package --no-dependencies
          VSIX=$(ls *.vsix)
          echo "vsix_file=${VSIX}" >> $GITHUB_OUTPUT
          echo "::notice::Packaged ${VSIX}"

      # ── Publish (skipped on dry-run) ──────────────────────────────────────
      - name: Publish to VS Code Marketplace
        if: inputs.dry-run != true
        run: |
          cd apps/vscode-ext
          npx @vscode/vsce publish -p ${{ secrets.VSCE_PAT }} --no-dependencies
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX Registry
        if: inputs.dry-run != true
        run: |
          cd apps/vscode-ext
          npx ovsx publish ${{ steps.package.outputs.vsix_file }} -p ${{ secrets.OVSX_PAT }}
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        continue-on-error: true

      # ── Commit, tag, push (skipped on dry-run) ───────────────────────────
      - name: Commit version bump
        if: inputs.dry-run != true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/vscode-ext/package.json apps/vscode-ext/CHANGELOG.md
          git commit -m "chore: release v${{ steps.bump.outputs.version }}"

      - name: Tag and push
        if: inputs.dry-run != true
        run: |
          git tag "v${{ steps.bump.outputs.version }}"
          git push origin main --follow-tags

      # ── GitHub Release (skipped on dry-run) ──────────────────────────────
      - name: Create GitHub Release
        if: inputs.dry-run != true
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.bump.outputs.version }}"
          name: "v${{ steps.bump.outputs.version }}"
          body: |
            ## Shiftspace v${{ steps.bump.outputs.version }}

            ${{ steps.changelog.outputs.body }}

            Published to the [VS Code Marketplace](https://marketplace.visualstudio.com/items?itemName=shiftspace.shiftspace).

            ### Install
            Download the `.vsix` file below and install:
            ```
            code --install-extension shiftspace-${{ steps.bump.outputs.version }}.vsix
            ```
          files: apps/vscode-ext/${{ steps.package.outputs.vsix_file }}

      # ── Dry-run artifact upload ───────────────────────────────────────────
      - name: Upload .vsix artifact (dry run)
        if: inputs.dry-run == true
        uses: actions/upload-artifact@v4
        with:
          name: shiftspace-${{ steps.bump.outputs.version }}.vsix
          path: apps/vscode-ext/${{ steps.package.outputs.vsix_file }}
          retention-days: 7

      # ── Summary ───────────────────────────────────────────────────────────
      - name: Summary
        run: |
          echo "## \U0001F680 Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Version** | \`v${{ steps.bump.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Bump** | ${{ inputs.bump }} (\`${{ steps.bump.outputs.previous }}\` → \`${{ steps.bump.outputs.version }}\`) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Dry run** | ${{ inputs.dry-run }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Package** | \`${{ steps.package.outputs.vsix_file }}\` |" >> $GITHUB_STEP_SUMMARY
          if [ "${{ inputs.dry-run }}" != "true" ]; then
            echo "| **Tag** | \`v${{ steps.bump.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
            echo "| **Marketplace** | [shiftspace](https://marketplace.visualstudio.com/items?itemName=shiftspace.shiftspace) |" >> $GITHUB_STEP_SUMMARY
          fi
