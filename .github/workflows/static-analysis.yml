name: 🔍 Static Analysis

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: static-analysis-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-analysis:
    name: 🔍 Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Restore Nx cache
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: nx-${{ runner.os }}-static-${{ github.sha }}
          restore-keys: |
            nx-${{ runner.os }}-static-

      - name: Restore typecheck cache
        uses: actions/cache@v4
        with:
          path: |
            packages/*/tsconfig.tsbuildinfo
            apps/*/tsconfig.tsbuildinfo
          key: tsbuildinfo-${{ runner.os }}-${{ hashFiles('**/tsconfig.json', 'bun.lock', '**/*.ts', '**/*.tsx') }}
          restore-keys: |
            tsbuildinfo-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Format check
        run: bun fmt:check

      - name: Lint
        run: bun lint:check

      - name: Typecheck
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            npx nx run-many -t typecheck
          else
            npx nx affected -t typecheck --base=origin/${{ github.event.pull_request.base.ref }}
          fi

      - name: Dead code check
        run: bun deadcode
