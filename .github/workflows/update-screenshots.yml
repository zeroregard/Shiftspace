name: E2E Tests - Update snapshots

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    name: 📸 Update Screenshots
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Restore Playwright browsers cache
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('apps/preview/package.json') }}

      - name: Install Playwright system deps
        run: bun run --filter @shiftspace/preview playwright:install-deps

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bun run --filter @shiftspace/preview playwright:install

      - name: Record baseline SHA
        id: baseline
        run: echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Update snapshots
        run: bun run --filter @shiftspace/preview test:e2e:update

      - name: Commit updated screenshots
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/preview/e2e/__screenshots__/
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No screenshot changes detected."
          else
            git commit -m "chore: update playwright screenshots"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "new_sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          fi

      - name: Find associated PR
        if: steps.commit.outputs.changed == 'true'
        id: find-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(gh pr list \
            --repo "${{ github.repository }}" \
            --head "${{ github.ref_name }}" \
            --state open \
            --json number \
            --jq '.[0].number // empty')
          echo "pr_number=${PR_NUMBER:-}" >> $GITHUB_OUTPUT
          if [ -z "$PR_NUMBER" ]; then
            echo "No open PR found for branch ${{ github.ref_name }} — skipping comment."
          else
            echo "Found PR #$PR_NUMBER"
          fi

      - name: Post before/after screenshot comparison
        if: steps.commit.outputs.changed == 'true' && steps.find-pr.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          OLD_SHA: ${{ steps.baseline.outputs.sha }}
          NEW_SHA: ${{ steps.commit.outputs.new_sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          BRANCH: ${{ github.ref_name }}
        run: |
          # Build the comment header
          {
            echo "## 📸 Screenshot Comparison"
            echo ""
            echo "Screenshots updated by the [Update Screenshots workflow](${RUN_URL}) on branch \`${BRANCH}\`."
            echo ""
          } > /tmp/pr-comment.md

          CHANGED_COUNT=0

          while IFS=$'\t' read -r status file; do
            [ -z "$file" ] && continue
            CHANGED_COUNT=$((CHANGED_COUNT + 1))
            NAME=$(basename "$file")

            case "$status" in
              M)
                BEFORE_URL="https://raw.githubusercontent.com/${REPO}/${OLD_SHA}/${file}"
                AFTER_URL="https://raw.githubusercontent.com/${REPO}/${NEW_SHA}/${file}"
                {
                  echo "### \`${NAME}\`"
                  echo ""
                  echo "| Before | After |"
                  echo "|--------|-------|"
                  echo "| ![before](${BEFORE_URL}) | ![after](${AFTER_URL}) |"
                  echo ""
                } >> /tmp/pr-comment.md
                ;;
              A)
                AFTER_URL="https://raw.githubusercontent.com/${REPO}/${NEW_SHA}/${file}"
                {
                  echo "### \`${NAME}\` _(new)_"
                  echo ""
                  echo "| Added |"
                  echo "|-------|"
                  echo "| ![new](${AFTER_URL}) |"
                  echo ""
                } >> /tmp/pr-comment.md
                ;;
              D)
                BEFORE_URL="https://raw.githubusercontent.com/${REPO}/${OLD_SHA}/${file}"
                {
                  echo "### \`${NAME}\` _(removed)_"
                  echo ""
                  echo "| Removed |"
                  echo "|---------|"
                  echo "| ![removed](${BEFORE_URL}) |"
                  echo ""
                } >> /tmp/pr-comment.md
                ;;
            esac
          done < <(git diff --name-status "${OLD_SHA}" "${NEW_SHA}" -- apps/preview/e2e/__screenshots__/)

          if [ "$CHANGED_COUNT" -eq 0 ]; then
            echo "No screenshot file changes found in diff — skipping PR comment."
            exit 0
          fi

          echo "Posting comparison for ${CHANGED_COUNT} changed screenshot(s) to PR #${{ steps.find-pr.outputs.pr_number }}."
          gh pr comment "${{ steps.find-pr.outputs.pr_number }}" \
            --repo "${{ github.repository }}" \
            --body-file /tmp/pr-comment.md
