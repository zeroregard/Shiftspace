name: E2E Tests - Update snapshots

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    name: 📸 Update Screenshots
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Restore Playwright browsers cache
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('apps/preview/package.json') }}

      - name: Install Playwright system deps
        run: bun run --filter @shiftspace/preview playwright:install-deps

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bun run --filter @shiftspace/preview playwright:install

      - name: Update snapshots
        run: bun run --filter @shiftspace/preview test:e2e:update

      - name: Commit updated screenshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/preview/e2e/__screenshots__/
          git diff --cached --quiet || git commit -m "chore: update playwright screenshots"
          git push
