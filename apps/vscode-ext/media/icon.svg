<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Root node -->
  <circle cx="12" cy="3.5" r="1.5"/>
  <!-- Mid-level nodes -->
  <circle cx="5.5" cy="11" r="1.5"/>
  <circle cx="18.5" cy="11" r="1.5"/>
  <!-- Leaf nodes -->
  <circle cx="5.5" cy="20.5" r="1.5"/>
  <circle cx="18.5" cy="20.5" r="1.5"/>
  <!-- Edges: root → mid -->
  <line x1="11.1" y1="4.8" x2="6.4" y2="9.7"/>
  <line x1="12.9" y1="4.8" x2="17.6" y2="9.7"/>
  <!-- Edges: mid → leaf -->
  <line x1="5.5" y1="12.5" x2="5.5" y2="19"/>
  <line x1="18.5" y1="12.5" x2="18.5" y2="19"/>
</svg>
